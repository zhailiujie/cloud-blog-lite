<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="cloud-blog-lite logo">
  <defs>
    <!-- Background: deep indigo → bright cyan (top-left to bottom-right) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <!-- Subtle inner shadow on cloud for depth -->
    <filter id="cloudShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────────── -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- ── Cloud (3 overlapping circles + flat base rect) ─── -->
  <!-- left bump  -->  <circle cx="46" cy="62" r="18" fill="white" filter="url(#cloudShadow)"/>
  <!-- center bump --> <circle cx="66" cy="52" r="18" fill="white" filter="url(#cloudShadow)"/>
  <!-- right bump  --> <circle cx="84" cy="60" r="16" fill="white" filter="url(#cloudShadow)"/>
  <!-- flat base   --> <rect   x="28" y="62" width="72" height="18" fill="white"/>

  <!-- ── Navigation site-cards below the cloud ─────────── -->
  <!-- Row 1: three prominent cards (like site tiles) -->
  <rect x="20" y="90" width="24" height="9" rx="4.5" fill="white" opacity="0.90"/>
  <rect x="50" y="90" width="26" height="9" rx="4.5" fill="white" opacity="0.90"/>
  <rect x="82" y="90" width="26" height="9" rx="4.5" fill="white" opacity="0.90"/>

  <!-- Row 2: dimmer secondary cards (depth / more items) -->
  <rect x="20" y="105" width="16" height="7" rx="3.5" fill="white" opacity="0.42"/>
  <rect x="42" y="105" width="22" height="7" rx="3.5" fill="white" opacity="0.42"/>
  <rect x="70" y="105" width="18" height="7" rx="3.5" fill="white" opacity="0.42"/>
  <rect x="94" y="105" width="14" height="7" rx="3.5" fill="white" opacity="0.42"/>
</svg>
